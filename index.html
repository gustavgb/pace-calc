<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pace Calculator</title>
    <meta name="description" content="Calculate your running pace from distance and time">
    <meta name="theme-color" content="#667eea">
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="page-calc-icon1.png">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="page-calc-icon1.png">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Pace">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pace Calculator</h1>
        
        <div class="input-group">
            <label for="distance">Distance (km)</label>
            <input type="number" id="distance" placeholder="e.g., 5" step="0.01" min="0">
        </div>

        <div class="input-group">
            <label>Time</label>
            <div class="time-inputs">
                <input type="number" id="minutes" placeholder="Minutes" min="0" step="1">
                <input type="number" id="seconds" placeholder="Seconds" min="0" max="59" step="1">
            </div>
        </div>

        <button onclick="calculatePace()">Calculate Pace</button>
        
        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <div class="result-label">Your pace per km</div>
            <div class="result-value" id="pace">--:--</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
